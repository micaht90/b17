<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>B-17 — 3D Cockpit Preview</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: "Courier New", monospace; }
    #c, #o { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #o { z-index: 2; }
    #tag { position: fixed; right: 12px; top: 10px; z-index: 3; color: #e6b84d; font-weight: bold; font-size: 13px; opacity: .85; }
    #hint { position: fixed; left: 0; right: 0; bottom: 12px; z-index: 3; text-align: center; color: #cdd9e3; text-shadow: 0 1px 2px #000; font-size: 13px; }
  </style>
  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.min.js" } }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <canvas id="o"></canvas>
  <div id="tag">B-17 · 3D COCKPIT</div>
  <div id="hint">Drag the red THROTTLE handle up/down to set power</div>
  <span id="spd" style="display:none"></span>
  <script type="module" src="./js/g3d/main3d.js"></script>
</body>
</html>
